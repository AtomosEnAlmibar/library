<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="book-container"></div>
    <button class="open-add-book-dialog-button"><img src="./assets/plus.svg" alt="add">Add book</button>
    <dialog id="dialog">
        <form>
            <span>Book Information</span>
            <div class="form-block">
                <label for="title">Title</label>
                <input type="text" name="title" id="title" placeholder="Berserk" required>
            </div>
            <div class="form-block">
                <label for="author">Author</label>
                <input type="text" name="author" id="author" placeholder="Kentaro Miura" required>
            </div>
            <div class="form-block">
                <label for="pages">Pages</label>
                <input type="number" name="pages" id="pages" placeholder="295" required>
            </div>
            <div class="add-book-button-list">
                <button id="add-book-button" type="submit">Confirm</button>
                <button class="close" formnovalidate>Cancel</button>
            </div>
        </form>
    </dialog>
</body>
</html>
